<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <defs>
    <radialGradient id="hg" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="45%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </radialGradient>
    <radialGradient id="fg" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="60%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </radialGradient>
    <radialGradient id="eg" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="40%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </radialGradient>
    <linearGradient id="mg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- Antenna -->
  <line x1="48" y1="22" x2="48" y2="10" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
  <circle cx="48" cy="8" r="3.5" fill="#a78bfa"/>
  <!-- Head -->
  <rect x="16" y="22" width="64" height="58" rx="12" fill="url(#hg)"/>
  <!-- Face panel -->
  <rect x="20" y="27" width="56" height="48" rx="8" fill="url(#fg)" opacity="0.85"/>
  <!-- Left eye -->
  <circle cx="34" cy="45" r="8" fill="#0f172a"/>
  <circle cx="34" cy="45" r="6" fill="url(#eg)"/>
  <circle cx="34" cy="45" r="2.5" fill="#0ea5e9"/>
  <circle cx="31.5" cy="42.5" r="1.5" fill="white" opacity="0.8"/>
  <!-- Right eye -->
  <circle cx="62" cy="45" r="8" fill="#0f172a"/>
  <circle cx="62" cy="45" r="6" fill="url(#eg)"/>
  <circle cx="62" cy="45" r="2.5" fill="#0ea5e9"/>
  <circle cx="59.5" cy="42.5" r="1.5" fill="white" opacity="0.8"/>
  <!-- Nose -->
  <circle cx="48" cy="55" r="1.5" fill="#a78bfa" opacity="0.6"/>
  <!-- Mouth -->
  <rect x="30" y="62" width="36" height="7" rx="3.5" fill="#0f172a"/>
  <rect x="32" y="63.5" width="32" height="4" rx="2" fill="url(#mg)"/>
  <line x1="36" y1="63.5" x2="36" y2="67.5" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>
  <line x1="42" y1="63.5" x2="42" y2="67.5" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>
  <line x1="48" y1="63.5" x2="48" y2="67.5" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>
  <line x1="54" y1="63.5" x2="54" y2="67.5" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>
  <line x1="58" y1="63.5" x2="58" y2="67.5" stroke="#0ea5e9" stroke-width="1" opacity="0.5"/>
  <!-- Ears -->
  <rect x="10" y="34" width="6" height="14" rx="3" fill="#7c3aed"/>
  <rect x="80" y="34" width="6" height="14" rx="3" fill="#7c3aed"/>
